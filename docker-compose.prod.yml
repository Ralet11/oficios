version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: oficios-api
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:4000"
    environment:
      # Database (external PostgreSQL)
      - DATABASE_URL=${DATABASE_URL}
      
      # App
      - NODE_ENV=production
      - PORT=4000
      - APP_URL=${APP_URL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - JWT_SECRET=${JWT_SECRET}
      
      # Upload provider (Cloudinary or S3)
      - UPLOAD_PROVIDER=${UPLOAD_PROVIDER:-cloudinary}
      - UPLOAD_MAX_FILE_SIZE_MB=${UPLOAD_MAX_FILE_SIZE_MB:-12}
      
      # Cloudinary config (if using Cloudinary)
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - CLOUDINARY_UPLOAD_FOLDER=${CLOUDINARY_UPLOAD_FOLDER:-oficios}
      
      # S3 config (if using S3)
      - S3_BUCKER=${S3_BUCKET}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_PUBLIC_BASE_URL=${S3_PUBLIC_BASE_URL}
      - S3_UPLOAD_PREFIX=${S3_UPLOAD_PREFIX:-oficios}
      
      # Business logic
      - SELECTION_TIMEOUT_HOURS=${SELECTION_TIMEOUT_HOURS:-24}
    env_file:
      - .env.production
    networks:
      - oficios-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  oficios-network:
    driver: bridge
